name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: restored-src
        run: npm install --legacy-peer-deps

      - name: Restore internal SDKs
        working-directory: restored-src
        run: |
          cp -r node_modules_sourcemap/@anthropic-ai/bedrock-sdk node_modules/@anthropic-ai/
          cp -r node_modules_sourcemap/@anthropic-ai/vertex-sdk node_modules/@anthropic-ai/
          cp -r node_modules_sourcemap/@anthropic-ai/foundry-sdk node_modules/@anthropic-ai/

      - name: Build
        working-directory: restored-src
        run: bun run build.ts

      - name: Verify build
        working-directory: restored-src
        run: node dist/cli.js --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-cli
          path: restored-src/dist/cli.js

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: claude-code-cli
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/cli.js
          generate_release_notes: true
